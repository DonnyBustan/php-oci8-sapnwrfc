name: Docker Image CI
on:
  # push:
  #   branches: [ "php84","php74" ]
  # pull_request:
  #   branches: [ "php84","php74" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}:${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set lowercase repository name
      run: |
        echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check Secret
      run: |
        if [ -z "${{ secrets.DOCKERHUBTOKEN }}" ]; then
          echo "TOKEN EMPTY"
          exit 1
        else
         echo "TOKEN FOUND"
        fi

    - name: Log in to DOCKERHUB
      uses: docker/login-action@v3
      with:
        username: "donnysisi"
        password: ${{ secrets.DOCKERHUBTOKEN }}

    - name: Generate ENV
      id: date
      run: |
        echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        BASE_IMAGE=$(head -1 Dockerfile | sed 's/FROM //')
        echo "BASE_IMAGE=$BASE_IMAGE" >> $GITHUB_OUTPUT
        docker run --rm $BASE_IMAGE env > envs.txt
        grep "PHP_VERSION=" envs.txt >> $GITHUB_OUTPUT

    - name: Check ENV
      run: |
        echo "DATE: ${{ steps.date.outputs.DATE }}"
        echo "BASE IMAGE: ${{ steps.date.outputs.BASE_IMAGE }}"
        echo "PHP VERSION: ${{ steps.date.outputs.PHP_VERSION }}"

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.PHP_VERSION }}
          donnysisi/php:${{ github.ref_name }}
          donnysisi/php:${{ steps.date.outputs.PHP_VERSION }}
          donnysisi/php:latest
        labels: |
          org.opencontainers.image.authors=donnysisi
        cache-from: type=gha
        cache-to: type=gha,mode=max
